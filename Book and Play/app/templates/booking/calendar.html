{% extends "base.html" %}

{% block title %}Kalender{% endblock %}

{% block content %}
<!-- Calendar Header -->
<div class="calendar-header">
    <div class="calendar-nav">
        <button class="btn btn-secondary btn-sm" id="btn-prev" title="Vorherige Woche">&larr;</button>
        <button class="btn btn-secondary btn-sm" id="btn-today">Heute</button>
        <button class="btn btn-secondary btn-sm" id="btn-next" title="Nächste Woche">&rarr;</button>
    </div>
    <h2 class="calendar-title" id="calendar-title">Wird geladen...</h2>
</div>

<!-- Mobile Day Navigation -->
<div class="day-nav">
    <button class="btn btn-secondary btn-sm" id="btn-day-prev">&larr;</button>
    <h3 class="day-title" id="day-title"></h3>
    <button class="btn btn-secondary btn-sm" id="btn-day-next">&rarr;</button>
</div>

<!-- Desktop: Week Grid -->
<div class="calendar-grid">
    <table class="calendar-table" id="calendar-table">
        <thead id="calendar-thead"></thead>
        <tbody id="calendar-tbody"></tbody>
    </table>
</div>

<!-- Mobile: Day View -->
<div class="day-courts" id="day-courts"></div>

<!-- Legend -->
<div class="calendar-legend">
    <div class="legend-item"><span class="legend-dot available"></span> Frei</div>
    <div class="legend-item"><span class="legend-dot booked"></span> Belegt</div>
    <div class="legend-item"><span class="legend-dot own"></span> Meine Buchung</div>
    <div class="legend-item"><span class="legend-dot blocked"></span> Gesperrt</div>
</div>

<!-- Booking Modal -->
<div class="modal-overlay" id="booking-modal">
    <div class="modal">
        <h3 class="modal-title">Platz buchen</h3>
        <div class="modal-info">
            <div class="modal-info-row">
                <span class="modal-info-label">Platz</span>
                <span class="modal-info-value" id="bm-court"></span>
            </div>
            <div class="modal-info-row">
                <span class="modal-info-label">Datum</span>
                <span class="modal-info-value" id="bm-date"></span>
            </div>
            <div class="modal-info-row">
                <span class="modal-info-label">Uhrzeit</span>
                <span class="modal-info-value" id="bm-time"></span>
            </div>
            <div class="modal-info-row">
                <span class="modal-info-label">Preis</span>
                <span class="modal-info-value" id="bm-price"></span>
            </div>
        </div>
        <div class="form-group">
            <label for="bm-guest">Mitspieler (optional)</label>
            <input type="text" id="bm-guest" placeholder="Name des Mitspielers">
        </div>
        <div class="modal-actions">
            <button class="btn btn-secondary" id="bm-cancel">Abbrechen</button>
            <button class="btn btn-success" id="bm-confirm">Jetzt buchen</button>
        </div>
    </div>
</div>

<!-- Cancel Modal -->
<div class="modal-overlay" id="cancel-modal">
    <div class="modal">
        <h3 class="modal-title">Buchung stornieren</h3>
        <div class="modal-info">
            <div class="modal-info-row">
                <span class="modal-info-label">Platz</span>
                <span class="modal-info-value" id="cm-court"></span>
            </div>
            <div class="modal-info-row">
                <span class="modal-info-label">Datum</span>
                <span class="modal-info-value" id="cm-date"></span>
            </div>
            <div class="modal-info-row">
                <span class="modal-info-label">Uhrzeit</span>
                <span class="modal-info-value" id="cm-time"></span>
            </div>
        </div>
        <p id="cm-message" style="font-size:14px; margin-top:8px;"></p>
        <div class="modal-actions">
            <button class="btn btn-secondary" id="cm-cancel">Abbrechen</button>
            <button class="btn btn-danger" id="cm-confirm">Stornieren</button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/calendar.js') }}"></script>
<script src="{{ url_for('static', filename='js/booking.js') }}"></script>
{% endblock %}
