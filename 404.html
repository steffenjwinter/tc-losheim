<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Seite nicht gefunden | TC Rot-Weiß Losheim</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    .page-404 {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--sand);
      padding: 24px;
      text-align: center;
    }
    .card-404 {
      background: var(--weiss);
      border-radius: var(--radius-xl);
      box-shadow: var(--schatten-xl);
      max-width: 520px;
      width: 100%;
      padding: 56px 48px;
      position: relative;
      overflow: hidden;
    }
    .card-404::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: var(--rot);
    }
    .ball-404 {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      position: relative;
      animation: bounce404 2s ease-in-out infinite;
    }
    .ball-404-inner {
      width: 80px;
      height: 80px;
      background: #c8e020;
      border-radius: 50%;
      position: relative;
      box-shadow: 0 8px 24px rgba(200, 224, 32, 0.3);
    }
    .ball-404-inner::before {
      content: '';
      position: absolute;
      top: 8px; left: 12px;
      width: 16px;
      height: 64px;
      border: 3px solid rgba(255,255,255,0.5);
      border-radius: 50%;
      transform: rotate(-30deg);
    }
    .ball-404-inner::after {
      content: '';
      position: absolute;
      top: 8px; right: 12px;
      width: 16px;
      height: 64px;
      border: 3px solid rgba(255,255,255,0.5);
      border-radius: 50%;
      transform: rotate(30deg);
    }
    .ball-shadow {
      width: 60px;
      height: 12px;
      background: rgba(0,0,0,0.08);
      border-radius: 50%;
      margin: 8px auto 0;
      animation: shadowPulse 2s ease-in-out infinite;
    }
    @keyframes bounce404 {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
    @keyframes shadowPulse {
      0%, 100% { transform: scaleX(1); opacity: 0.08; }
      50% { transform: scaleX(0.7); opacity: 0.04; }
    }
    .code-404 {
      font-size: 6rem;
      font-weight: 900;
      color: var(--sand-dark);
      line-height: 1;
      letter-spacing: -0.05em;
      margin-bottom: 8px;
    }
    .card-404 h1 {
      font-size: 1.5rem;
      margin-bottom: 12px;
      color: var(--text);
    }
    .card-404 p {
      font-size: 0.95rem;
      color: var(--text-light);
      margin-bottom: 28px;
      line-height: 1.6;
    }
    .links-404 {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid var(--sand);
    }
    .links-404 a {
      font-size: 0.85rem;
      color: var(--text-muted);
      transition: color 0.2s, padding-left 0.2s;
    }
    .links-404 a:hover {
      color: var(--rot);
      padding-left: 4px;
    }
  </style>
</head>
<body>
  <div class="page-404">
    <div class="card-404">
      <div class="ball-404">
        <div class="ball-404-inner"></div>
      </div>
      <div class="ball-shadow"></div>

      <div class="code-404">404</div>
      <h1>Dieser Ball ist ins Aus gegangen</h1>
      <p>Die Seite die du suchst existiert nicht — vielleicht wurde sie verschoben oder der Link ist veraltet.</p>

      <div style="display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;">
        <a href="index.html" class="btn btn-primary">Zur Startseite</a>
        <a href="pages/kontakt.html" class="btn btn-outline-dark">Kontakt</a>
      </div>

      <div class="links-404">
        <a href="pages/mannschaften.html">Mannschaften</a>
        <a href="pages/tennisschule.html">Tennisschule</a>
        <a href="pages/platzbuchung.html">Platzbuchung</a>
        <a href="pages/mitglied.html">Mitglied werden</a>
      </div>
    </div>
  </div>
</body>
</html>
